
services:
  database:
    image: postgres:16
    container_name: nodejs2025q2-service-database
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: home_library
    networks:
      - app-network
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: nodejs2025q2-service-app
    restart: always
    env_file:
      - .env
    depends_on:
      - database
    networks:
      - app-network
    ports:
      - '4000:4000'
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  pgdata:

networks:
  app-network:
    driver: bridge
